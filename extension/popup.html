<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Cognitive Guardian</title>
    <style>
      body {
        width: 250px;
        padding: 15px;
        font-family: "Inter", system-ui, sans-serif;
        text-align: center;
        background-color: #f8fafc;
        color: #0f172a;
      }

      h1 {
        font-size: 18px;
        margin-top: 0;
        color: #8b5cf6;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      p {
        font-size: 13px;
        color: #64748b;
      }

      button {
        padding: 10px 16px;
        width: 100%;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        margin-top: 10px;
      }

      #toggleBtn {
        background-color: #8b5cf6;
        color: white;
      }

      #toggleBtn:hover {
        background-color: #7c3aed;
      }

      #toggleBtn.active {
        background-color: #ef4444;
      }

      #toggleBtn.active:hover {
        background-color: #dc2626;
      }

      .status-indicator {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background-color: #cbd5e1;
        margin-right: 5px;
      }

      .status-indicator.on {
        background-color: #10b981;
        box-shadow: 0 0 8px #10b981;
      }

      .consent-container {
        margin-top: 15px;
        background: white;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #e2e8f0;
        display: flex;
        align-items: flex-start;
        gap: 8px;
        text-align: left;
      }

      .consent-container input[type="checkbox"] {
        margin-top: 3px;
        accent-color: #8b5cf6;
        cursor: pointer;
      }

      .consent-text {
        font-size: 11px;
        color: #475569;
        line-height: 1.4;
      }

      .terms-link {
        display: inline-block;
        margin-top: 10px;
        font-size: 12px;
        color: #8b5cf6;
        text-decoration: none;
        font-weight: 500;
      }

      .terms-link:hover {
        text-decoration: underline;
      }

      #errorMsg {
        display: none;
        color: #ef4444;
        font-size: 12px;
        margin-top: 5px;
        font-weight: 500;
      }

      .lang-container {
        margin-top: 20px;
        border-top: 1px solid #e2e8f0;
        padding-top: 15px;
        font-size: 13px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .lang-container #el_lang_label {
        color: #64748b;
        font-weight: 500;
      }

      .lang-container #langSelect {
        padding: 6px;
        border-radius: 6px;
        border: 1px solid #cbd5e1;
        outline: none;
        background: white;
        color: #475569;
        font-family: inherit;
        font-size: 13px;
        cursor: pointer;
      }

      #analyticsBtn {
        background-color: #f1f5f9;
        color: #475569;
        border: 1px solid #e2e8f0;
      }

      #analyticsBtn:hover {
        background-color: #e2e8f0;
      }
    </style>
  </head>

  <body>
    <h1><span class="icon">🛡️</span> Cognitive Guardian</h1>
    <p id="el_subtitle">Tu sistema inmunológico digital.</p>

    <div style="margin: 15px 0">
      <span id="statusIndicator" class="status-indicator"></span>
      <span id="statusText">Inactivo</span>
    </div>

    <button id="analyticsBtn">Ver Estadísticas</button>
    <div style="margin-bottom: 10px"></div>

    <div class="consent-container">
      <input type="checkbox" id="consentCb" />
      <label for="consentCb" class="consent-text" id="el_consent_label">
        Acepto compartir mi pantalla y pestañas para el análisis.
      </label>
    </div>
    <div id="errorMsg">
      Debes aceptar los términos para iniciar el Guardián.
    </div>

    <button id="toggleBtn">Iniciar Guardián</button>

    <a href="about.html" target="_blank" class="terms-link" id="el_terms_link"
      >Términos y Acerca de</a
    >

    <div class="lang-container">
      <span id="el_lang_label">Idioma:</span>
      <select id="langSelect">
        <option value="en">English</option>
        <option value="es">Español</option>
        <option value="pt">Português</option>
        <option value="fr">Français</option>
      </select>
    </div>

    <script src="i18n.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
